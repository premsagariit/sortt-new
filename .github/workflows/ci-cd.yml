name: Sortt Deploy
run-name: Deploy – ${{ github.event.head_commit.message }}

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Package ────────────────────────────────────────────
  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    env:
      # ── Database ──────────────────────────────────────────────────
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # ── Clerk Auth ────────────────────────────────────────────────
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      # Required by Next.js web build (NEXT_PUBLIC_ vars are inlined at build time)
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      # ── API URLs ──────────────────────────────────────────────────
      NEXT_PUBLIC_API_URL: https://sortt-backend-fpe6c8bdbnd0fpg2.centralindia-01.azurewebsites.net

      # ── Cloudflare R2 ─────────────────────────────────────────────
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      STORAGE_PROVIDER: r2

      # ── Ably Realtime ─────────────────────────────────────────────
      ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
      REALTIME_PROVIDER: ably

      # ── Maps ──────────────────────────────────────────────────────
      OLA_MAPS_API_KEY: ${{ secrets.OLA_MAPS_API_KEY }}
      MAP_PROVIDER: ola

      # ── Gemini AI ─────────────────────────────────────────────────
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_DAILY_LIMIT: '1200'

      # ── Meta WhatsApp ─────────────────────────────────────────────
      META_WHATSAPP_TOKEN: ${{ secrets.META_WHATSAPP_TOKEN }}
      META_PHONE_NUMBER_ID: ${{ secrets.META_PHONE_NUMBER_ID }}
      META_WABA_ID: ${{ secrets.META_WABA_ID }}
      META_OTP_TEMPLATE_NAME: hello_world
      META_API_VERSION: v22.0

      # ── Upstash Redis ─────────────────────────────────────────────
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      # ── HMAC Secrets ──────────────────────────────────────────────
      OTP_HMAC_SECRET: ${{ secrets.OTP_HMAC_SECRET }}
      PHONE_HASH_SECRET: ${{ secrets.PHONE_HASH_SECRET }}

      # ── Expo Push ─────────────────────────────────────────────────
      EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}

      # ── Admin ─────────────────────────────────────────────────────
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      # ── Server ────────────────────────────────────────────────────
      PORT: '8080'
      NODE_ENV: production
      LOG_PLAINTEXT_OTP: 'false'
      ALLOWED_ORIGINS: https://sortt-backend-fpe6c8bdbnd0fpg2.centralindia-01.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter "@sortt/*" run build

      - name: Build backend
        working-directory: backend
        run: pnpm run build

      - name: Build web
        working-directory: apps/web
        run: pnpm run build

      - name: Prepare deploy folder
        run: pnpm --filter backend deploy --prod deploy_folder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_folder

  # ─── Azure Deploy ───────────────────────────────────────────────
  deploy:
    name: Azure Deploy
    needs: build-and-package
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3610773F6F2B4CD18830681681F0BB0A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1B224F6A492B4A5EBF38EFC55F89FEC6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DBEA10DC933642F29D45F2302830F36F }}

      - name: Warmup
        run: sleep 10

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sortt-backend'
          slot-name: 'Production'
          package: .
