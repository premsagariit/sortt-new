name: Sortt Deploy
run-name: Deploy – ${{ github.event.head_commit.message }}

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Package ────────────────────────────────────────────
  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    env:
      # These build-time values are injected from GitHub Secrets.
      # Backend runtime secrets remain in Azure App Service settings.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter "@sortt/*" run build

      - name: Build backend
        working-directory: backend
        run: pnpm run build

      - name: Build web
        working-directory: apps/web
        run: pnpm run build

      - name: Prepare deploy folder
        run: pnpm --filter backend deploy --legacy --prod deploy_folder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_folder

  # ─── Azure Deploy ───────────────────────────────────────────────
  deploy:
    name: Azure Deploy
    needs: build-and-package
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3610773F6F2B4CD18830681681F0BB0A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1B224F6A492B4A5EBF38EFC55F89FEC6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DBEA10DC933642F29D45F2302830F36F }}

      - name: Warmup
        run: sleep 10

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sortt-backend'
          slot-name: 'Production'
          package: .
