name: Build and deploy Node.js app to Azure Web App - sortt-backend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AZURE_WEBAPP_NAME: sortt-backend

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/main_sortt-backend.yml
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DBE9B81201524353AEDD0747163886EB }}
      AZURE_TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_5C18C1AAFBB845F89A8B2F36A45ADF4B }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BE24B10B5F68490C88B909FFD16622FA }}
      AZURE_CREDENTIALS_JSON: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend dependencies and backend
        run: |
          pnpm --filter @sortt/maps build
          pnpm --filter @sortt/realtime build
          pnpm --filter @sortt/storage build
          pnpm --filter @sortt/analysis build
          pnpm --filter backend build

      - name: Create deployment package
        run: |
          mkdir -p release
          cp -R backend release/backend
          cp -R packages release/packages
          cp package.json pnpm-lock.yaml pnpm-workspace.yaml release/
          cd release
          zip -r ../release.zip .

      - name: Azure Login (legacy OIDC secret style)
        if: ${{ env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Login (service principal JSON fallback)
        if: ${{ env.AZURE_CLIENT_ID == '' && env.AZURE_CREDENTIALS_JSON != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS_JSON }}

      - name: Deploy to Azure Web App (publish profile)
        if: ${{ env.AZURE_PUBLISH_PROFILE != '' && env.AZURE_CLIENT_ID == '' && env.AZURE_CREDENTIALS_JSON == '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ env.AZURE_PUBLISH_PROFILE }}
          package: release.zip

      - name: Deploy to Azure Web App (azure/login)
        if: ${{ env.AZURE_CLIENT_ID != '' || env.AZURE_CREDENTIALS_JSON != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: release.zip

      - name: Fail with clear credential setup message
        if: ${{ env.AZURE_CLIENT_ID == '' && env.AZURE_CREDENTIALS_JSON == '' && env.AZURE_PUBLISH_PROFILE == '' }}
        run: |
          echo "::error::No deploy credentials found."
          echo "::error::Add one of:"
          echo "::error::1) OIDC secrets for this repo: AZUREAPPSERVICE_CLIENTID_DBE9B81201524353AEDD0747163886EB, AZUREAPPSERVICE_TENANTID_5C18C1AAFBB845F89A8B2F36A45ADF4B, AZUREAPPSERVICE_SUBSCRIPTIONID_BE24B10B5F68490C88B909FFD16622FA"
          echo "::error::2) AZURE_CREDENTIALS"
          echo "::error::3) AZURE_WEBAPP_PUBLISH_PROFILE"
          exit 1
