name: Build and deploy Node.js app to Azure Web App - sortt-backend-fpe6c8bdbnd0fpg2

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/main_sortt-backend.yml
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend dependencies and backend
        run: |
          pnpm --filter @sortt/maps build
          pnpm --filter @sortt/realtime build
          pnpm --filter @sortt/storage build
          pnpm --filter @sortt/analysis build
          pnpm --filter backend build

      - name: Create deployment package
        run: |
          mkdir -p release
          cp -R backend release/backend
          cp -R packages release/packages
          cp package.json pnpm-lock.yaml pnpm-workspace.yaml release/
          cd release
          zip -r ../release.zip .

      - name: Azure Login (legacy OIDC secret style)
        if: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3610773F6F2B4CD18830681681F0BB0A != '' && secrets.AZUREAPPSERVICE_TENANTID_1B224F6A492B4A5EBF38EFC55F89FEC6 != '' && secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DBEA10DC933642F29D45F2302830F36F != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3610773F6F2B4CD18830681681F0BB0A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1B224F6A492B4A5EBF38EFC55F89FEC6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DBEA10DC933642F29D45F2302830F36F }}

      - name: Azure Login (service principal JSON fallback)
        if: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3610773F6F2B4CD18830681681F0BB0A == '' && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App (publish profile)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' && secrets.AZUREAPPSERVICE_CLIENTID_3610773F6F2B4CD18830681681F0BB0A == '' && secrets.AZURE_CREDENTIALS == '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: sortt-backend-fpe6c8bdbnd0fpg2
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip

      - name: Deploy to Azure Web App (azure/login)
        if: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3610773F6F2B4CD18830681681F0BB0A != '' || secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: sortt-backend-fpe6c8bdbnd0fpg2
          package: release.zip

      - name: Fail with clear credential setup message
        if: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3610773F6F2B4CD18830681681F0BB0A == '' && secrets.AZURE_CREDENTIALS == '' && secrets.AZURE_WEBAPP_PUBLISH_PROFILE == '' }}
        run: |
          echo "::error::No deploy credentials found."
          echo "::error::Add one of:"
          echo "::error::1) Legacy OIDC secrets (old repo style): AZUREAPPSERVICE_CLIENTID_3610773F6F2B4CD18830681681F0BB0A, AZUREAPPSERVICE_TENANTID_1B224F6A492B4A5EBF38EFC55F89FEC6, AZUREAPPSERVICE_SUBSCRIPTIONID_DBEA10DC933642F29D45F2302830F36F"
          echo "::error::2) AZURE_CREDENTIALS"
          echo "::error::3) AZURE_WEBAPP_PUBLISH_PROFILE"
          exit 1
