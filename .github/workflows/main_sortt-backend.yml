# .github/workflows/main_sortt-backend.yml
name: Build and deploy Node.js app to Azure Web App - sortt-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'  # FIX: was '24.x' — Azure App Service Linux Node
                                 # stacks top out at 20 LTS; 24.x not yet available
                                 # on Azure. Mismatched runtime = crash on startup.

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install all workspace dependencies
        run: pnpm install  # installs root + all packages/* + backend

      - name: Build backend TypeScript
        # FIX Bug 2: explicitly target the backend package, not the root.
        # This runs `tsc --project tsconfig.json` inside backend/
        # and produces the dist/ folder that pnpm deploy will copy.
        run: pnpm --filter backend run build

      - name: Deploy backend to staging folder
        # FIX Bug 1+3: removed --force-legacy-deploy (invalid flag).
        # FIX Bug 4: --filter moved to pnpm position, not the subcommand.
        # pnpm deploy copies: package.json + node_modules (prod only) + files["dist"]
        # The result is a self-contained folder ready for Azure.
        run: pnpm --filter backend deploy --prod deploy_folder

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_folder

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3610773F6F2B4CD18830681681F0BB0A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1B224F6A492B4A5EBF38EFC55F89FEC6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DBEA10DC933642F29D45F2302830F36F }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sortt-backend'
          slot-name: 'Production'
          package: .