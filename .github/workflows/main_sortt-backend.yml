# .github/workflows/main_sortt-backend.yml
name: Build and deploy Node.js app to Azure Web App - sortt-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
          - uses: actions/checkout@v4

          - name: Set up Node.js version
            uses: actions/setup-node@v4
            with:
              node-version: '24.x'

          - name: Install pnpm
            run: npm install -g pnpm

          - name: Install all workspace dependencies
            run: pnpm install

          - name: Build backend TypeScript
            run: pnpm --filter backend run build

          - name: Deploy backend to staging folder
            run: pnpm --filter backend deploy --prod --legacy deploy_folder

          - name: Upload artifact for deployment job
            uses: actions/upload-artifact@v4
            with:
              name: node-app
              path: deploy_folder

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3610773F6F2B4CD18830681681F0BB0A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1B224F6A492B4A5EBF38EFC55F89FEC6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DBEA10DC933642F29D45F2302830F36F }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sortt-backend'
          slot-name: 'Production'
          package: .