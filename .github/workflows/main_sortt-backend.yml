name: Build and deploy Node.js app to Azure Web App - sortt-backend-fpe6c8bdbnd0fpg2

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/main_sortt-backend.yml
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend dependencies and backend
        run: |
          pnpm --filter @sortt/maps build
          pnpm --filter @sortt/realtime build
          pnpm --filter @sortt/storage build
          pnpm --filter @sortt/analysis build
          pnpm --filter backend build

      - name: Create deployment package
        run: |
          mkdir -p release
          cp -R backend release/backend
          cp -R packages release/packages
          cp package.json pnpm-lock.yaml pnpm-workspace.yaml release/
          cd release
          zip -r ../release.zip .

      - name: Validate Azure deploy secrets
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ] && [ -z "$AZURE_CREDENTIALS" ]; then
            echo "::error::Missing Azure deploy secret. Add either AZURE_WEBAPP_PUBLISH_PROFILE or AZURE_CREDENTIALS in repo settings."
            exit 1
          fi

      - name: Azure Login (service principal)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE == '' && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App (publish profile)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: sortt-backend-fpe6c8bdbnd0fpg2
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip

      - name: Deploy to Azure Web App (azure/login)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE == '' && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: sortt-backend-fpe6c8bdbnd0fpg2
          package: release.zip
